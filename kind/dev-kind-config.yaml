# Kind cluster: dev
# API server exposed on host port 30443.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # Không dùng disableDefaultCNI: kindnet chạy mặc định → node Ready ngay → monitoring pod
  # schedule được → CRD ServiceMonitor có mặt → Cilium sync sau không bị deadlock.
  podSubnet: 10.201.0.0/16
  serviceSubnet: 10.221.0.0/16

nodes:
  - role: control-plane
    image: kindest/node:v1.28.0
    extraPortMappings:
      - containerPort: 6443
        hostPort: 30443
        protocol: TCP
