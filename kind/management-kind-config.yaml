# Kind cluster: management - runs Argo CD
# API server exposed on host port 33443.
# After create: kubectl config set-cluster kind-management --server=https://127.0.0.1:33443
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # Disable default CNI so we can install Cilium explicitly.
  disableDefaultCNI: true
  podSubnet: 10.200.0.0/16
  serviceSubnet: 10.220.0.0/16

containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
      SystemdCgroup = true

nodes:
  - role: control-plane
    image: kindest/node:v1.28.0
    extraPortMappings:
      - containerPort: 6443
        hostPort: 33443
        protocol: TCP
