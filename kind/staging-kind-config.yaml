# Kind cluster: staging
# API server exposed on host port 32443.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # Không dùng disableDefaultCNI: kindnet chạy mặc định → node Ready ngay → monitoring pod
  # schedule được → CRD ServiceMonitor có mặt → Cilium sync sau không bị deadlock.
  podSubnet: 10.202.0.0/16
  serviceSubnet: 10.222.0.0/16

nodes:
  - role: control-plane
    image: kindest/node:v1.28.0
    extraPortMappings:
      - containerPort: 6443
        hostPort: 32443
        protocol: TCP
