# Multi-repo Jenkins (JCasC Job DSL)
# - go-micro-order: multibranch (PR → buildServicePr, main → buildService)
# - 5 app job khác: pipelineJob main-only (rollout multibranch sau)
# - 1 job gitops: SCM → go-micro-gitops.git + Jenkinsfile → gitopsPipeline()
# - Shared Library: go-micro-pipeline-lib@main
# Trigger: Build Now (manual) HOẶC git push → GitHub webhook (githubPush).
#   Mỗi job chỉ listen repo của nó — push order không chạy client.
#   Kind: expose Jenkins (ngrok/cloudflare) + webhook URL .../github-webhook/ trên từng GitHub repo.
controller:
  image:
    repository: minhtri1612/jenkins-custom
    tag: "2.504.1-lts-jdk17-pkg1"
    pullPolicy: IfNotPresent

  # Chart mặc định pod runAsNonRoot:true → dockerd trong dind không chạy được (Argo Progressing mãi).
  # Bỏ runAsNonRoot ở pod; jenkins container vẫn uid 1000 qua containerSecurityContext của chart.
  podSecurityContextOverride:
    fsGroup: 1000

  containerEnv:
    - name: DOCKER_HOST
      value: tcp://127.0.0.1:2375

  # Secret jenkins-ci-env: bash scripts/jenkins-setup-ci-secrets.sh (trước hoặc sau sync Jenkins)
  containerEnvFrom:
    - secretRef:
        name: jenkins-ci-env
        optional: true

  # DinD: sidecar chạy root (runAsUser 0), Jenkins gọi qua DOCKER_HOST.
  sidecars:
    additionalSidecarContainers:
      - name: dind
        image: docker:27.5.1-dind
        command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        volumeMounts:
          - name: dind-storage
            mountPath: /var/lib/docker

  admin:
    username: "admin"
    password: "admin"

  # Plugin bắt buộc cho JCasC + Job DSL pipeline seed.
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - pipeline-model-definition
    - configuration-as-code
    - job-dsl
    - git
    - github
    - github-branch-source
    - workflow-multibranch
    - pipeline-stage-view
    - blueocean

  installLatestPlugins: false

  initContainerResources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClass: standard
    size: "10Gi"

  numExecutors: 1

  javaOpts: "-Duser.timezone=Asia/Ho_Chi_Minh"

  ingress:
    enabled: false

  JCasC:
    defaultConfig: true
    configScripts:
      00-global-library: |
        unclassified:
          globalLibraries:
            libraries:
              - name: go-micro-pipeline-lib
                defaultVersion: main
                retriever:
                  modernSCM:
                    scm:
                      git:
                        remote: https://github.com/minhtri1612/go-micro-pipeline-lib.git
                        credentialsId: github-go-micro-pat
      01-app-pipeline-jobs: |
        jobs:
          - script: |
              pipelineJob('go-micro-client') {
                displayName('go-micro-client')
                description('App repo → buildService(client). Trigger: Build Now hoặc push go-micro-client.')
                triggers { githubPush() }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-client.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
              pipelineJob('go-micro-payment') {
                displayName('go-micro-payment')
                description('App repo → buildService(payment). Trigger: Build Now hoặc push go-micro-payment.')
                triggers { githubPush() }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-payment.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
              pipelineJob('go-micro-product') {
                displayName('go-micro-product')
                description('App repo → buildService(product). Trigger: Build Now hoặc push go-micro-product.')
                triggers { githubPush() }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-product.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
              pipelineJob('go-micro-inventory') {
                displayName('go-micro-inventory')
                description('App repo → buildService(inventory). Trigger: Build Now hoặc push go-micro-inventory.')
                triggers { githubPush() }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-inventory.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
              pipelineJob('go-micro-notification') {
                displayName('go-micro-notification')
                description('App repo → buildService(noti). Trigger: Build Now hoặc push go-micro-notification.')
                triggers { githubPush() }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-notification.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
      01b-order-multibranch: |
        jobs:
          - script: |
              multibranchPipelineJob('go-micro-order') {
                displayName('go-micro-order')
                description('Multibranch pilot: PR/feature → buildServicePr; main → buildService. Webhook hoặc Scan folder.')
                branchSources {
                  branchSource {
                    source {
                      github {
                        id('go-micro-order-github')
                        scanCredentialsId('github-go-micro-pat')
                        repoOwner('minhtri1612')
                        repository('go-micro-order')
                        traits {
                          gitHubBranchDiscovery {
                            strategyId(3)
                          }
                          gitHubPullRequestDiscovery {
                            strategyId(1)
                          }
                          headWildcardFilter {
                            includes('main PR-* feature/* fix/*')
                            excludes('')
                          }
                        }
                      }
                    }
                  }
                }
                factory {
                  workflowBranchProjectFactory {
                    scriptPath('Jenkinsfile')
                  }
                }
                orphanedItemStrategy {
                  discardOldItems {
                    numToKeep(15)
                  }
                }
                triggers {
                  periodicFolderTrigger {
                    interval('30m')
                  }
                }
              }
      02-gitops-pipeline-job: |
        jobs:
          - script: |
              pipelineJob('go-micro-gitops') {
                displayName('go-micro-gitops')
                description('GitOps repo → gitopsPipeline(). Trigger: Build Now hoặc push go-micro-gitops.')
                triggers { githubPush() }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-gitops.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
      03-ci-credentials: |
        credentials:
          system:
            domainCredentials:
            - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: dockerhub-credentials
                  username: "${DOCKERHUB_USER}"
                  password: "${DOCKERHUB_PASSWORD}"
                  description: Docker Hub push (from Secret jenkins-ci-env)
              - usernamePassword:
                  scope: GLOBAL
                  id: github-go-micro-pat
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_PAT}"
                  description: GitHub PAT — clone private repos + push go-micro-gitops

  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

serviceAccountAgent:
  create: true

rbac:
  create: true

persistence:
  volumes:
    - name: kubeconfig
      secret:
        secretName: jenkins-internal-kubeconfig
        defaultMode: 0644
        items:
          - key: config
            path: config
    - name: dind-storage
      emptyDir: {}
  mounts:
    - name: kubeconfig
      mountPath: /var/jenkins_home/.kube/config
      subPath: config
      readOnly: true
