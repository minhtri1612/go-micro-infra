# Multi-repo Jenkins (JCasC Job DSL)
# - 6 job app: SCM → go-micro-{service}.git + Jenkinsfile → buildService()
# - 1 job gitops: SCM → go-micro-gitops.git + Jenkinsfile → gitopsPipeline()
# - Shared Library: go-micro-pipeline-lib@main
# Kind lab: SCM poll (H/5) — không cần GitHub webhook / plugin github.
controller:
  image:
    repository: minhtri1612/jenkins-custom
    tag: "2.504.1-lts-jdk17-pkg1"
    pullPolicy: IfNotPresent

  # Chart mặc định pod runAsNonRoot:true → dockerd trong dind không chạy được (Argo Progressing mãi).
  # Bỏ runAsNonRoot ở pod; jenkins container vẫn uid 1000 qua containerSecurityContext của chart.
  podSecurityContextOverride:
    fsGroup: 1000

  containerEnv:
    - name: DOCKER_HOST
      value: tcp://127.0.0.1:2375

  # Secret jenkins-ci-env: bash scripts/jenkins-setup-ci-secrets.sh (trước hoặc sau sync Jenkins)
  containerEnvFrom:
    - secretRef:
        name: jenkins-ci-env
        optional: true

  # DinD: sidecar chạy root (runAsUser 0), Jenkins gọi qua DOCKER_HOST.
  sidecars:
    additionalSidecarContainers:
      - name: dind
        image: docker:27.5.1-dind
        command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        volumeMounts:
          - name: dind-storage
            mountPath: /var/lib/docker

  admin:
    username: "admin"
    password: "admin"

  # Plugin bắt buộc cho JCasC + Job DSL pipeline seed.
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - pipeline-model-definition
    - configuration-as-code
    - job-dsl
    - git
    - pipeline-stage-view
    - blueocean

  installLatestPlugins: false

  initContainerResources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClass: standard
    size: "10Gi"

  numExecutors: 1

  javaOpts: "-Duser.timezone=Asia/Ho_Chi_Minh"

  ingress:
    enabled: false

  JCasC:
    defaultConfig: true
    configScripts:
      00-global-library: |
        unclassified:
          globalLibraries:
            libraries:
              - name: go-micro-pipeline-lib
                defaultVersion: main
                retriever:
                  modernSCM:
                    scm:
                      git:
                        remote: https://github.com/minhtri1612/go-micro-pipeline-lib.git
                        credentialsId: github-go-micro-pat
      01-app-pipeline-jobs: |
        jobs:
          - script: |
              def apps = [
                'go-micro-client',
                'go-micro-order',
                'go-micro-payment',
                'go-micro-product',
                'go-micro-inventory',
                'go-micro-notification',
              ]
              apps.each { repo ->
                pipelineJob(repo) {
                  displayName(repo)
                  description("App repo → buildService() via @Library go-micro-pipeline-lib. SCM poll (Kind lab).")
                  triggers {
                    scm('H/5 * * * *')
                  }
                  definition {
                    cpsScm {
                      scm {
                        git {
                          remote {
                            url("https://github.com/minhtri1612/${repo}.git")
                            credentials('github-go-micro-pat')
                          }
                          branch('*/main')
                        }
                      }
                      scriptPath('Jenkinsfile')
                    }
                  }
                }
              }
      02-gitops-pipeline-job: |
        jobs:
          - script: |
              pipelineJob('go-micro-gitops') {
                displayName('go-micro-gitops')
                description('GitOps repo → gitopsPipeline(): env/ test+promote, rollback. SCM poll (Kind lab).')
                triggers {
                  scm('H/5 * * * *')
                }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/minhtri1612/go-micro-gitops.git')
                          credentials('github-go-micro-pat')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }
      03-ci-credentials: |
        credentials:
          system:
            domainCredentials:
            - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: dockerhub-credentials
                  username: "${DOCKERHUB_USER}"
                  password: "${DOCKERHUB_PASSWORD}"
                  description: Docker Hub push (from Secret jenkins-ci-env)
              - usernamePassword:
                  scope: GLOBAL
                  id: github-go-micro-pat
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_PAT}"
                  description: GitHub PAT — clone private repos + push go-micro-gitops

  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

serviceAccountAgent:
  create: true

rbac:
  create: true

persistence:
  volumes:
    - name: kubeconfig
      secret:
        secretName: jenkins-internal-kubeconfig
        defaultMode: 0644
        items:
          - key: config
            path: config
    - name: dind-storage
      emptyDir: {}
  mounts:
    - name: kubeconfig
      mountPath: /var/jenkins_home/.kube/config
      subPath: config
      readOnly: true
